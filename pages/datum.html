<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Datum & Zeit – Konvertierungs-Tools</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav><div class="nav-inner">
  <a href="../index.html" class="nav-brand">🔧 <span>KONVERTER</span></a>
  <button id="nav-toggle" class="nav-toggle"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="6" x2="20" y2="6"/><line x1="2" y1="11" x2="20" y2="11"/><line x1="2" y1="16" x2="20" y2="16"/></svg></button>
  <ul class="nav-links" id="nav-links">
    <li><a href="../index.html">Start</a></li><li><a href="text.html">Text</a></li><li><a href="farbe.html">Farbe</a></li><li><a href="hash.html">Hash</a></li><li><a href="base64.html">Base64</a></li><li><a href="json-csv.html">JSON/CSV</a></li><li><a href="datum.html">Datum/Zeit</a></li>
  </ul>
</div></nav>
<div class="page-header"><span class="icon">📅</span><h1>DATUM & <em>ZEIT</em></h1><p>Unix-Timestamp · ISO 8601 · Zeitzonenumrechnung · Differenz</p></div>
<main>

  <!-- Unix Timestamp -->
  <div class="card">
    <h2>🕐 Unix-Timestamp</h2>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem">
      <div class="field" style="flex:1;min-width:180px"><label>Timestamp (Sekunden)</label><input type="number" id="ts-in" placeholder="1700000000" oninput="fromTs()"></div>
      <button class="btn btn-sm" onclick="setNow()">Jetzt</button>
    </div>
    <div id="ts-out" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.6rem"></div>
  </div>

  <!-- Datum → Timestamp -->
  <div class="card">
    <h2>📅 Datum → Timestamp</h2>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem">
      <div class="field" style="flex:1;min-width:200px"><label>Datum & Uhrzeit</label><input type="datetime-local" id="dt-in" oninput="fromDt()"></div>
      <div class="field" style="min-width:180px"><label>Zeitzone</label>
        <select id="tz-sel" onchange="fromDt()">
          <option value="local">Lokal</option>
          <option value="UTC">UTC</option>
          <option value="Europe/Berlin">Europe/Berlin</option>
          <option value="America/New_York">America/New_York</option>
          <option value="Asia/Tokyo">Asia/Tokyo</option>
        </select>
      </div>
    </div>
    <div id="dt-out"></div>
  </div>

  <!-- Datumsdifferenz -->
  <div class="card">
    <h2>📐 Datumsdifferenz</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
      <div class="field"><label>Von</label><input type="date" id="diff-from"></div>
      <div class="field"><label>Bis</label><input type="date" id="diff-to"></div>
    </div>
    <button class="btn btn-sm" onclick="calcDiff()">Differenz berechnen</button>
    <div id="diff-out" style="margin-top:.75rem"></div>
  </div>

  <!-- Zeitzonenübersicht -->
  <div class="card">
    <h2>🌍 Aktuelle Zeit in Zeitzonen</h2>
    <div id="tz-overview" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.6rem"></div>
  </div>

</main>
<footer><p>Alle Berechnungen lokal. <a href="../index.html">Alle Tools</a></p></footer>
<script src="../js/nav.js"></script>
<script>
function stat(label,val){return`<div style="background:var(--surface2);border-radius:7px;padding:.6rem .85rem;cursor:pointer" onclick="navigator.clipboard.writeText('${val.replace(/'/g,"\\'")}')" title="Kopieren"><div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem">${label}</div><div style="font-family:var(--mono);font-size:.82rem;word-break:break-all">${val}</div></div>`;}

function fromTs(){
  const ts=parseInt(document.getElementById('ts-in').value);
  if(isNaN(ts))return;
  const d=new Date(ts*1000);
  document.getElementById('ts-out').innerHTML=[
    stat('Lokal DE',d.toLocaleString('de-DE')),
    stat('UTC',d.toUTCString()),
    stat('ISO 8601',d.toISOString()),
    stat('Unix (ms)',ts*1000),
    stat('Unix (s)',ts),
    stat('Wochentag',d.toLocaleDateString('de-DE',{weekday:'long'})),
    stat('KW','KW '+getKW(d)),
    stat('Tage seit Epoch',Math.floor(ts/86400)),
  ].join('');
}

function getKW(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dow=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-dow);const y=new Date(Date.UTC(t.getUTCFullYear(),0,1));return Math.ceil((((t-y)/86400000)+1)/7);}

function setNow(){
  const ts=Math.floor(Date.now()/1000);
  document.getElementById('ts-in').value=ts;
  fromTs();
}

function fromDt(){
  const v=document.getElementById('dt-in').value;
  if(!v)return;
  const d=new Date(v);
  const ts=Math.floor(d.getTime()/1000);
  document.getElementById('dt-out').innerHTML=[
    stat('Unix-Timestamp (s)',ts),
    stat('Unix-Timestamp (ms)',ts*1000),
    stat('ISO 8601',d.toISOString()),
    stat('RFC 2822',d.toUTCString()),
  ].join('');
}

function calcDiff(){
  const f=new Date(document.getElementById('diff-from').value);
  const t=new Date(document.getElementById('diff-to').value);
  if(isNaN(f)||isNaN(t))return alert('Beide Daten eingeben');
  const ms=Math.abs(t-f);
  const days=Math.floor(ms/86400000);
  const weeks=Math.floor(days/7);
  const months=Math.abs((t.getFullYear()-f.getFullYear())*12+(t.getMonth()-f.getMonth()));
  const years=Math.floor(months/12);
  document.getElementById('diff-out').innerHTML=[
    stat('Tage',days),stat('Wochen',weeks+' Wochen, '+(days%7)+' Tage'),
    stat('Monate (ca.)',months),stat('Jahre (ca.)',years+' Jahre, '+(months%12)+' Monate'),
    stat('Stunden',Math.floor(ms/3600000)),stat('Sekunden',Math.floor(ms/1000)),
  ].join('');
}

// Timezone overview
const TZS=[['UTC','UTC'],['Europe/Berlin','Berlin'],['Europe/London','London'],['America/New_York','New York'],['America/Los_Angeles','Los Angeles'],['America/Sao_Paulo','São Paulo'],['Asia/Dubai','Dubai'],['Asia/Kolkata','Mumbai'],['Asia/Tokyo','Tokio'],['Australia/Sydney','Sydney']];
function renderTZ(){
  const now=new Date();
  document.getElementById('tz-overview').innerHTML=TZS.map(([tz,name])=>{
    const t=now.toLocaleTimeString('de-DE',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const d=now.toLocaleDateString('de-DE',{timeZone:tz,weekday:'short',day:'2-digit',month:'short'});
    return`<div style="background:var(--surface2);border-radius:7px;padding:.6rem .85rem"><div style="font-size:.7rem;color:var(--muted);margin-bottom:.2rem">${name}</div><div style="font-family:var(--mono);font-size:1rem;font-weight:700">${t}</div><div style="font-size:.72rem;color:var(--muted)">${d}</div></div>`;
  }).join('');
}

// Init
setNow();
const now=new Date();
document.getElementById('dt-in').value=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
const today=now.toISOString().split('T')[0];
document.getElementById('diff-from').value='2024-01-01';
document.getElementById('diff-to').value=today;
renderTZ();
setInterval(renderTZ,1000);
</script>
</body></html>
