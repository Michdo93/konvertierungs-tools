<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Base64 / URL / HTML – Konvertierungs-Tools</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav><div class="nav-inner">
  <a href="../index.html" class="nav-brand">🔧 <span>KONVERTER</span></a>
  <button id="nav-toggle" class="nav-toggle"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="6" x2="20" y2="6"/><line x1="2" y1="11" x2="20" y2="11"/><line x1="2" y1="16" x2="20" y2="16"/></svg></button>
  <ul class="nav-links" id="nav-links">
    <li><a href="../index.html">Start</a></li><li><a href="text.html">Text</a></li><li><a href="farbe.html">Farbe</a></li><li><a href="hash.html">Hash</a></li><li><a href="base64.html">Base64</a></li><li><a href="json-csv.html">JSON/CSV</a></li><li><a href="datum.html">Datum/Zeit</a></li>
  </ul>
</div></nav>
<div class="page-header"><span class="icon">🔤</span><h1>BASE64 / URL / <em>HTML</em></h1><p>Encode & Decode · Base64 · URL-Encoding · HTML-Entities</p></div>
<main>

  <!-- BASE64 -->
  <div class="card">
    <h2>🔤 Base64</h2>
    <div class="two-col">
      <div>
        <div class="field"><label>Klartext</label><textarea id="b64-plain" rows="5" placeholder="Text…" oninput="encB64()"></textarea></div>
        <button class="btn btn-sm" onclick="encB64()">→ Encode</button>
      </div>
      <div class="arrow-mid">⇄</div>
      <div>
        <div class="field"><label>Base64</label><textarea id="b64-enc" rows="5" placeholder="Base64…" oninput="decB64()"></textarea></div>
        <button class="btn btn-sm" onclick="decB64()">← Decode</button>
      </div>
    </div>
    <div style="margin-top:.5rem">
      <div class="field"><label>Datei → Base64</label><input type="file" id="b64-file" onchange="fileToB64()" style="font-family:'Inter',sans-serif;color:var(--white)"></div>
      <div class="output" id="b64-file-out" style="display:none;font-size:.78rem"></div>
    </div>
  </div>

  <!-- URL -->
  <div class="card">
    <h2>🔗 URL-Encoding</h2>
    <div class="two-col">
      <div>
        <div class="field"><label>Klartext</label><textarea id="url-plain" rows="4" placeholder="https://example.de?name=Max Müller" oninput="encUrl()"></textarea></div>
        <button class="btn btn-sm" onclick="encUrl()">→ Encode</button>
      </div>
      <div class="arrow-mid">⇄</div>
      <div>
        <div class="field"><label>URL-kodiert</label><textarea id="url-enc" rows="4" placeholder="%C3%BC …" oninput="decUrl()"></textarea></div>
        <button class="btn btn-sm" onclick="decUrl()">← Decode</button>
      </div>
    </div>
  </div>

  <!-- HTML -->
  <div class="card">
    <h2>🏷 HTML-Entities</h2>
    <div class="two-col">
      <div>
        <div class="field"><label>HTML / Text</label><textarea id="html-plain" rows="4" placeholder='<div class="x">Hällö & Wörld</div>' oninput="encHtml()"></textarea></div>
        <button class="btn btn-sm" onclick="encHtml()">→ Encode</button>
      </div>
      <div class="arrow-mid">⇄</div>
      <div>
        <div class="field"><label>Entities</label><textarea id="html-enc" rows="4" placeholder="&lt;div …" oninput="decHtml()"></textarea></div>
        <button class="btn btn-sm" onclick="decHtml()">← Decode</button>
      </div>
    </div>
  </div>

</main>
<footer><p>Alle Berechnungen lokal. <a href="../index.html">Alle Tools</a></p></footer>
<script src="../js/nav.js"></script>
<script>
// Base64
function encB64(){try{document.getElementById('b64-enc').value=btoa(unescape(encodeURIComponent(document.getElementById('b64-plain').value)));}catch(e){document.getElementById('b64-enc').value='Fehler: '+e.message;}}
function decB64(){try{document.getElementById('b64-plain').value=decodeURIComponent(escape(atob(document.getElementById('b64-enc').value.trim())));}catch(e){document.getElementById('b64-plain').value='Fehler: '+e.message;}}
function fileToB64(){
  const f=document.getElementById('b64-file').files[0]; if(!f) return;
  const r=new FileReader(); r.onload=e=>{document.getElementById('b64-file-out').textContent=e.target.result; document.getElementById('b64-file-out').style.display='block';};
  r.readAsDataURL(f);
}
// URL
function encUrl(){document.getElementById('url-enc').value=encodeURIComponent(document.getElementById('url-plain').value);}
function decUrl(){try{document.getElementById('url-plain').value=decodeURIComponent(document.getElementById('url-enc').value);}catch(e){document.getElementById('url-plain').value='Fehler: '+e.message;}}
// HTML
function encHtml(){
  const t=document.getElementById('html-plain').value;
  document.getElementById('html-enc').value=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/ä/g,'&auml;').replace(/ö/g,'&ouml;').replace(/ü/g,'&uuml;').replace(/Ä/g,'&Auml;').replace(/Ö/g,'&Ouml;').replace(/Ü/g,'&Uuml;').replace(/ß/g,'&szlig;');
}
function decHtml(){
  const t=document.getElementById('html-enc').value;
  const d=document.createElement('textarea'); d.innerHTML=t; document.getElementById('html-plain').value=d.value;
}
</script>
</body></html>
